<!DOCTYPE html>
<html>
<head>
    <title>CSS Styles Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="external.css">

    <!-- Internal CSS -->
    <style>
        /* Selector: p */
        p {
            font-size: 18px;     /* property: font-size, value: 18px */
            color: green;        /* property: color, value: green */
        }
    </style>
</head>

<body>

    <h2>External CSS Example</h2>

    <p>Internal CSS is applied to this paragraph.</p>

    <!-- Inline CSS -->
    <h3 style="color: red; font-style: italic;">
        Inline CSS Example
    </h3>

</body>
</html>
