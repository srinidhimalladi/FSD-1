<!DOCTYPE html>
<html>
<head>
    <title>HTML Tables Example</title>
</head>
<body>

<h2>Student Marks Table</h2>

<table border="1">
    <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Name</th>
        <th colspan="3">Marks</th>
    </tr>
    <tr>
        <th>Maths</th>
        <th>Physics</th>
        <th>Chemistry</th>
    </tr>
    <tr>
        <td>101</td>
        <td>Ravi</td>
        <td>85</td>
        <td>78</td>
        <td>88</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Anita</td>
        <td>90</td>
        <td>92</td>
        <td>89</td>
    </tr>
</table>

</body>
</html>
