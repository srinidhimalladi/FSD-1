<!DOCTYPE html>
<html>
  <head>
    <title>HTML LISTS</title>
  </head>
  <body>
  <h2>Unordered lists</h2>
  <ul>
    <li>Html</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>
  <h2>Ordered lists</h2>
    <ol>
      <li>Html</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ol>
    <h2>Nested lists</li>
    <ul>
      <li>Frontend</li>
        <ol>
          <li>Html</li>
          <li>CSS</li>
        </ol>
      </li>
      <li>Backend
        <ol>
          <li>Java</li>
          <li>Python</li>
        </ol>
      </li>
    </ul>
    <h2>Description lists</h2>
    <dl>
     <dt>Html</dt>
     <dd>-Hyper text markup language</dd>
     <dt>CSS</dt>
     <dd>-Cascading style sheets</dd>
    </dl>
  </body>
</html>
