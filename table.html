<!DOCTYPE html>
<html>
<head>
 <title>HTML Tables Example</title>
</head>
<body>
   
  <h2>Student Marks Table</h2>
   
  <table border="1" cellspacing="0" cellpadding="8">
    <tr>
      <th rowspan="2">Student Name</th>
      <th colspan="3">Marks</th>
      <th rowspan="2">Total</th>
    </tr>
    
    <tr>
      <th>Maths</th>
      <th>Science</th>
      <th>English</th>
    </tr>
     
    <tr>
      <td>Rajitha</td>
      <td>80</td>
      <td>75</td>
      <td>85</td>
      <td>240</td>
    </tr>
 
    <tr>
      <td>Sahithi</td>
      <td>90</td>
      <td>88</td>
      <td>92</td>
      <td>270</td>
    </tr>

    <tr>
      <td>Elsy</td>
      <td>70</td>
      <td>65</td>
      <td>75</td>
      <td>210</td>
    </tr>
 
  </table>
 
</body>
</html>
