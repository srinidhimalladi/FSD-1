<!DOCTYPE html>
<html>
<head>
<style>
.p1{
  font-size: 20px;           /* font-size */
  font-weight: bold;         /* font-weight */
}

.p2{
  font-style: italic;        /* font-style */
  text-decoration: underline;/* text-decoration */
}

.p3{
  text-transform: uppercase; /* text-transform */
  text-align: center;        /* text-align */
}
</style>
</head>

<body>

<p class="p1">This text shows font-size and font-weight.</p>

<p class="p2">This text shows font-style and text-decoration.</p>

<p class="p3">This text shows text-transform and text-align.</p>

</body>
</html>
