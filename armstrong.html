<!DOCTYPE html>
<html>
<body>
<script>
var num = parseInt(prompt("Enter a number:"));
var temp = num;
var sum = 0;

while (temp > 0) {
    var digit = temp % 10;
    sum = sum + digit*digit*digit;
    temp = parseInt(temp / 10);
}

if (sum == num)
    alert(num + " is an Armstrong Number");
else
    alert(num + " is not an Armstrong Number");
</script>
</body>
</html>
