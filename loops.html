<!DOCTYPE html>
<html>
<head>
<title>Print 1 to 10</title>
<script>
function printNumbers() {

    document.write("Using for loop:<br>");
    for (var i = 1; i <= 10; i++) {
        document.write(i + "<br>");
    }

    document.write("<br>Using while loop:<br>");
    var j = 1;
    while (j <= 10) {
        document.write(j + "<br>");
        j++;
    }

    document.write("<br>Using do-while loop:<br>");
    var k = 1;
    do {
        document.write(k + "<br>");
        k++;
    } while (k <= 10);
}
</script>
</head>

<body>
<button onclick="printNumbers()">Print Numbers</button>
</body>
</html>
