<!DOCTYPE html>
<html>
<head>
<style>
.c1 { color: red; }                 /* Color Name */
.c2 { color: #00FF00; }             /* HEX Value */
.c3 { color: rgb(0,0,255); }        /* RGB Value */
.c4 { color: rgba(255,0,0,0.5); }   /* RGBA Value */
.c5 { color: hsl(120,100%,50%); }   /* HSL Value */
</style>
</head>
<body>

<p class="c1">Color using Name</p>
<p class="c2">Color using HEX</p>
<p class="c3">Color using RGB</p>
<p class="c4">Color using RGBA</p>
<p class="c5">Color using HSL</p>

</body>
</html>
