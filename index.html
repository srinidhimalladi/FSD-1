<!DOCTYPE html>
<html>
<head>
    <title>Frames Example</title>
</head>
<frameset cols="33%,34%,33%">
    <frame src="image.html" name="imageFrame" scrolling="no" noresize>
    <frame src="paragraph.html" name="paraFrame" scrolling="auto" noresize>
    <frame src="link.html" name="linkFrame" scrolling="auto" noresize>
    <noframes>
        <body>
            <p>Your browser does not support frames. Please update your browser.</p>
        </body>
    </noframes>
</frameset>
</html>
