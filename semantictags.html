<!DOCTYPE html>
<html>
<head>
    <title>Semantic Tags</title>
</head>
<body>

<header>
    <h1>My Page</h1>
</header>

<nav>
    <span>Home | About</span>
</nav>

<main>
    <section>
        <article>
            <p>This is an <span>article</span>.</p>

            <figure>
                <figcaption>Sample Figure</figcaption>
            </figure>
        </article>
    </section>

    <aside>
        <p>Side content</p>
    </aside>
</main>

<footer>
    <p>Footer area</p>
</footer>

</body>
</html>
